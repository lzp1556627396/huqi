name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          python -m pip install pyinstaller

      - name: Build EXE
        shell: pwsh
        run: |
          pyinstaller --noconfirm --onefile --windowed --name AttendanceAnalyzer --paths src src/attendance_tool/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AttendanceAnalyzer-windows-exe
          path: dist/AttendanceAnalyzer.exe
